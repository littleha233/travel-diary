server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: travelaround-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:travelaround;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration

travelaround:
  jwt:
    secret: ${TRAVELAROUND_JWT_SECRET:dev-travelaround-secret-change-me-32-bytes}
    ttl-seconds: ${TRAVELAROUND_JWT_TTL_SECONDS:604800}
  cors:
    allowed-origins: ${TRAVELAROUND_CORS_ALLOWED_ORIGINS:*}
  ai:
    provider: ${TRAVELAROUND_AI_PROVIDER:mock}
    model: ${TRAVELAROUND_AI_MODEL:claude-haiku-4-5}
